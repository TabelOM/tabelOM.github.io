<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabeL Kalkulasi & Report</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-main: #f0f2f5;
            --navy: #123458;
            --gold: #fcc006;
            --text-muted: #65676b;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }

        body { 
            background: var(--bg-main); 
            overflow: hidden; 
            height: 100vh; 
        }

        /* --- Header / Navigation Bar --- */
        .unified-bar {
            display: flex;
            background: var(--navy);
            height: 35px;
            align-items: center;
            border-bottom: 3px solid var(--gold);
            position: relative;
            z-index: 100;
        }

        /* TOMBOL MENU POJOK KIRI - ESTETIK & MINIMALIS */
        .menu-dropdown {
            position: relative;
            height: 100%;
        }

        #btn-main-menu {
            background: var(--gold);
            border: none;
            color: var(--navy);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0 18px;
            height: 100%;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
            transition: background 0.2s ease;
        }

        #btn-main-menu:hover {
            background: #eab104;
        }

        /* Ikon Hamburger Garis Minimalis */
        .nav-icon {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .nav-icon span {
            display: block;
            width: 16px;
            height: 2px;
            background: var(--navy);
            border-radius: 2px;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 35px;
            left: 0;
            background-color: white;
            min-width: 230px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.15);
            z-index: 1000;
            border-radius: 0 0 10px 10px;
            overflow: hidden;
            border: 1px solid #eee;
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-content button {
            color: var(--navy);
            padding: 14px 20px;
            display: block;
            width: 100%;
            border: none;
            background: none;
            text-align: left;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border-bottom: 1px solid #f8f9fa;
        }

        .dropdown-content button:hover {
            background-color: #f1f4f7;
            padding-left: 25px; /* Efek geser minimalis */
        }

        .dropdown-content button.active {
            background: #f1f4f7;
            font-weight: 700;
            border-left: 5px solid var(--navy);
        }

        /* Running Text Area */
        #running-text-wrapper {
            flex-grow: 1;
            overflow: hidden;
            white-space: nowrap;
        }

        #running-content {
            display: inline-block;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .clock-container {
            background: var(--gold);
            color: var(--navy);
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: 800;
        }

        #btn-manage-rt {
            background: none; border: none; color: white;
            font-size: 1.2rem; cursor: pointer; padding: 0 15px;
            opacity: 0.7;
            transition: 0.2s;
        }
        #btn-manage-rt:hover { opacity: 1; }

        /* --- Content Area --- */
        .content-area { 
            height: calc(100vh - 35px); 
            position: relative;
        }
        
        .iframe-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
        }

        .iframe-layer.active {
            display: block;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* --- Modal System --- */
        .rt-modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
        }
        .rt-box {
            background: white; width: 90%; max-width: 400px;
            margin: 50px auto; border-radius: 15px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .rt-header { background: var(--navy); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .rt-body { padding: 20px; }
        #rt-input { width: 100%; height: 80px; padding: 10px; border: 1px solid #ddd; border-radius: 10px; resize: none; margin-bottom: 10px; }
        .btn-save { background: var(--navy); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .list-container { max-height: 250px; overflow-y: auto; margin-top: 15px; }
        #rt-list { list-style: none; padding: 0; }
        #rt-list li { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .item-text { flex-grow: 1; cursor: pointer; color: #333; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header class="unified-bar">
            <div class="menu-dropdown">
                <button id="btn-main-menu" onclick="toggleDropdown()">
                    <div class="nav-icon">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <span>MENU</span>
                </button>
                <div id="myDropdown" class="dropdown-content">
                    <button onclick="changeIframe(1, this)" class="active">📊 Tabel Kalkulasi</button>
                    <button onclick="changeIframe(2, this)">📝 Maintenance Report</button>
                </div>
            </div>

            <div id="running-text-wrapper">
                <span id="running-content">Menghubungkan ke Database...</span>
            </div>
            
            <div class="clock-container">
                <div id="digital-clock">00:00:00</div>
            </div>
            
            <button id="btn-manage-rt" onclick="openModal()">⚙️</button>
        </header>

        <main class="content-area">
            <div id="frame1" class="iframe-layer active">
                <iframe src="https://www.appsheet.com/start/1474754a-c8a9-4660-aeef-d197abcbdf76?platform=mobile#appName=TabelKalkulasiV1-761441667&vss=H4sIAAAAAAAAA6WOvRLCIBCE32VrnoBWLRxHGx0bsSDhMjIScAJRMwzvLiT-1Gq5e_vtbcRV020bZH0GP8SPWtEAjiiwGy4kwAVmzobOGQEmsJHtZM6lP1VOdkogIR3ZqyCQB49f8vzP_wxakQ260dSVsoLmkieYzwXLxhtCYmj7ICtD4-YRKmoK2t6YlHKmcXXvSe3zuF9G-aVd3C_SqrVTubaRxlN6AFxxLcV6AQAA&view=Dashboard"></iframe>
            </div>

            <div id="frame2" class="iframe-layer">
                <iframe src="https://tabelom.github.io/MaintenanceReport/"></iframe>
            </div>
        </main>
    </div>

    <div id="rt-modal" class="rt-modal">
        <div class="rt-box">
            <div class="rt-header">
                <h3>⚙️ Pengaturan Running Text</h3>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:25px; cursor:pointer;">&times;</button>
            </div>
            <div class="rt-body">
                <label style="font-weight: bold; color: var(--navy); font-size: 0.9rem;">Pesan Baru:</label>
                <textarea id="rt-input" placeholder="Tulis pesan Anda di sini..."></textarea>
                <button class="btn-save" id="btnSave" onclick="saveOrUpdate()">💾 Simpan</button>
                <div class="list-container">
                    <ul id="rt-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- LOGIKA IFRAME & DROPDOWN ---
        function toggleDropdown() {
            const dropdown = document.getElementById("myDropdown");
            dropdown.style.display = (dropdown.style.display === "block") ? "none" : "block";
        }

        function changeIframe(index, btn) {
            document.querySelectorAll('.iframe-layer').forEach(f => f.classList.remove('active'));
            document.getElementById('frame' + index).classList.add('active');
            
            document.querySelectorAll('.dropdown-content button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            toggleDropdown();
        }

        window.onclick = function(event) {
            if (!event.target.matches('#btn-main-menu') && !event.target.closest('#btn-main-menu')) {
                document.getElementById("myDropdown").style.display = "none";
            }
        }

        // --- FIREBASE SYSTEM ---
        const firebaseConfig = {
            apiKey: "AIzaSyDrueWSjgvjaGtKAr--NElsyHCSAa7ZqE4",
            authDomain: "tabelom60.firebaseapp.com",
            databaseURL: "https://tabelom60-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tabelom60",
            storageBucket: "tabelom60.firebasestorage.app",
            messagingSenderId: "823392737112",
            appId: "1:823392737112:web:6ccfafbd5123cdb858372d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let messages = [];
        let activeMessages = [];
        const span = document.getElementById("running-content");

        window.openModal = () => document.getElementById("rt-modal").style.display = "block";
        window.closeModal = () => document.getElementById("rt-modal").style.display = "none";

        window.saveOrUpdate = () => {
            const text = document.getElementById("rt-input").value.trim();
            if (text) db.ref("messages").push({ Text: text, Status: "active" }).then(() => {
                document.getElementById("rt-input").value = "";
            });
        };

        db.ref("messages").on("value", (snapshot) => {
            const data = snapshot.val();
            messages = [];
            if (data) Object.keys(data).forEach(key => messages.push({ ID: key, ...data[key] }));
            activeMessages = messages.filter(m => m.Status !== "hidden");
            renderList();
            if (activeMessages.length > 0 && (span.textContent.includes("Menghubungkan") || span.textContent === "")) {
                span.textContent = activeMessages[0].Text;
            }
        });

        function renderList() {
            const list = document.getElementById("rt-list");
            list.innerHTML = messages.map(m => `
                <li>
                    <span class="item-text">${m.Text}</span>
                    <span onclick="deleteMsg('${m.ID}')" style="cursor:pointer; color:#ff4d4d;">🗑️</span>
                </li>`).join('');
        }

        window.deleteMsg = (id) => { if(confirm("Hapus pesan ini?")) db.ref("messages/" + id).remove(); };

        span.addEventListener('animationiteration', () => {
            if (activeMessages.length > 1) {
                const currentIndex = activeMessages.findIndex(m => m.Text === span.textContent);
                const nextIndex = (currentIndex + 1) % activeMessages.length;
                span.textContent = activeMessages[nextIndex].Text;
            }
        });

        // --- CLOCK ---
        setInterval(() => {
            const now = new Date();
            document.getElementById("digital-clock").innerText = now.toLocaleTimeString('en-GB');
        }, 1000);
    </script>
</body>
</html>
