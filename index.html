<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabeL Kalkulasi & Report</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root { --navy: #123458; --gold: #fcc006; --bg: #f0f2f5; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,sans-serif; }
        body { background:var(--bg); overflow:hidden; height:100vh; }

        .unified-bar { display:flex; align-items:center; background:var(--navy); height:38px; border-bottom:3px solid var(--gold); position:relative; z-index:100; gap:4px; padding-left:6px; }
        .nav-btn { height:26px; padding:0 16px; border:none; border-radius:5px; cursor:pointer; font-size:0.78rem; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; transition:all 0.18s; white-space:nowrap; background:transparent; color:rgba(255,255,255,0.45); outline:1px solid rgba(255,255,255,0.15); }
        .nav-btn:hover:not(.active) { color:rgba(255,255,255,0.8); background:rgba(255,255,255,0.06); }
        .nav-btn.active { background:var(--gold); color:var(--navy); outline:none; box-shadow:0 2px 10px rgba(252,192,6,0.45); }

        /* Status koneksi - indikator kecil di navbar */
        #conn-status { display:flex; align-items:center; margin-left:4px; }
        #conn-dot { width:8px; height:8px; border-radius:50%; background:#ef4444; transition:background 0.4s; flex-shrink:0; }
        #conn-dot.on { background:#22c55e; box-shadow:0 0 5px #22c55e; }
        #conn-label { display:none; }

        #running-text-wrapper { flex-grow:1; overflow:hidden; white-space:nowrap; margin-left:4px; }
        #running-content { display:inline-block; color:white; font-size:0.95rem; font-weight:600; padding-left:100%; animation:marquee 10s linear infinite; }
        @keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-100%)} }

        .clock-container { background:var(--gold); color:var(--navy); padding:0 16px; height:100%; display:flex; align-items:center; font-weight:800; font-size:0.9rem; letter-spacing:1px; }
        #btn-manage-rt { background:none; border:none; color:white; font-size:1.1rem; cursor:pointer; padding:0 12px; }
        #btn-refresh { background:none; border:none; color:white; font-size:1rem; cursor:pointer; padding:0 8px; }

        .content-area { height:calc(100vh - 41px); position:relative; }
        .iframe-layer { position:absolute; inset:0; display:none; }
        .iframe-layer.active { display:block; }
        iframe { width:100%; height:100%; border:none; }

        /* CHAT FAB */
        #btn-chat { position:fixed; bottom:35px; right:35px; width:60px; height:60px; background:var(--navy); border:3px solid var(--gold); border-radius:50%; color:white; font-size:1.8rem; cursor:pointer; z-index:2500; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 15px rgba(0,0,0,0.3); transition:all 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
        #btn-chat:hover { transform:scale(1.1) rotate(5deg); background:#0d2540; }
        #btn-chat.pulse { animation:cpulse 2s infinite; }
        @keyframes cpulse { 0%{box-shadow:0 0 0 0 rgba(252,192,6,.7)} 70%{box-shadow:0 0 0 15px rgba(252,192,6,0)} 100%{box-shadow:0 0 0 0 rgba(252,192,6,0)} }
        #chat-badge { position:absolute; top:-5px; right:-5px; background:#ef4444; color:white; font-size:0.7rem; font-weight:800; border-radius:50%; width:22px; height:22px; display:none; align-items:center; justify-content:center; border:2px solid white; }
        #chat-badge.show { display:flex; }

        /* CHAT PANEL */
        #chat-panel { display:none; position:fixed; bottom:110px; right:35px; width:420px; height:600px; background:white; border-radius:20px; box-shadow:0 12px 40px rgba(0,0,0,0.3); z-index:3000; flex-direction:column; overflow:hidden; border:1px solid rgba(0,0,0,0.1); }
        #chat-panel.open { display:flex; animation:popIn 0.22s cubic-bezier(0.175,0.885,0.32,1.275); }
        @keyframes popIn { from{transform:scale(0.88) translateY(16px);opacity:0} to{transform:scale(1);opacity:1} }

        .chat-head { background:var(--navy); padding:10px 14px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .chat-head-left { display:flex; align-items:center; gap:10px; }
        .ch-online-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; flex-shrink:0; }
        .chat-title { color:white; font-weight:700; font-size:0.88rem; }
        .chat-sub { color:rgba(255,255,255,0.55); font-size:0.72rem; margin-top:1px; }
        #typing-status { color:#86efac; font-size:0.67rem; min-height:11px; }
        #btn-close-chat { background:rgba(255,255,255,0.1); border:none; color:white; width:26px; height:26px; border-radius:6px; cursor:pointer; font-size:0.9rem; }
        #btn-close-chat:hover { background:rgba(255,255,255,0.25); }

        /* name bar */
        #name-bar { display:flex; align-items:center; gap:8px; padding:6px 12px; background:#f5f7fa; border-bottom:1px solid #eee; flex-shrink:0; font-size:0.75rem; color:#666; }
        #name-bar strong { color:var(--navy); }
        #btn-chname { font-size:0.68rem; background:none; border:1px solid #ccc; border-radius:5px; padding:2px 7px; cursor:pointer; color:#555; }

        /* messages */
        #chat-messages { flex-grow:1; overflow-y:auto; padding:10px 8px; display:flex; flex-direction:column; gap:5px; background:#f0f2f5; }
        #chat-messages::-webkit-scrollbar { width:4px; }
        #chat-messages::-webkit-scrollbar-thumb { background:#ccc; border-radius:4px; }

        .msg-row { display:flex; flex-direction:column; max-width:82%; }
        .msg-row.me { align-self:flex-end; align-items:flex-end; }
        .msg-row.them { align-self:flex-start; align-items:flex-start; }
        .msg-sender { font-size:0.67rem; font-weight:700; margin-bottom:2px; padding:0 4px; }
        .msg-bubble { padding:9px 13px; border-radius:16px; font-size:0.85rem; line-height:1.4; word-break:break-word; }
        .msg-row.me .msg-bubble { background:var(--navy); color:white; border-radius:16px 16px 3px 16px; }
        .msg-row.them .msg-bubble { background:white; color:#111; border-radius:16px 16px 16px 3px; box-shadow:0 1px 6px rgba(0,0,0,0.07); }
        .msg-footer { display:flex; align-items:center; gap:6px; margin-top:2px; padding:0 4px; }
        .msg-row.me .msg-footer { justify-content:flex-end; }
        .msg-time { font-size:0.62rem; color:#aaa; }
        .btn-act { background:none; border:none; cursor:pointer; font-size:0.78rem; opacity:0; transition:opacity 0.15s; padding:1px 3px; }
        .msg-row:hover .btn-act { opacity:0.6; }
        .btn-act:hover { opacity:1!important; }

        .reply-quote { background:rgba(0,0,0,0.05); border-left:3px solid var(--navy); padding:5px 9px; margin-bottom:5px; border-radius:5px; font-size:0.76rem; color:#555; overflow:hidden; max-height:52px; }
        .msg-row.me .reply-quote { background:rgba(255,255,255,0.14); border-left-color:var(--gold); color:rgba(255,255,255,0.85); }
        .reply-qname { font-weight:800; font-size:0.67rem; display:block; margin-bottom:1px; }

        #reply-preview { display:none; padding:8px 36px 8px 14px; background:#fdfdfd; border-top:1px solid #eee; border-left:4px solid var(--navy); font-size:0.8rem; position:relative; flex-shrink:0; }
        #reply-preview.show { display:block; }
        #btn-cancel-reply { position:absolute; right:10px; top:8px; background:none; border:none; cursor:pointer; color:#bbb; font-size:1rem; }

        .chat-divider { text-align:center; font-size:0.66rem; color:#bbb; margin:3px 0; }

        .chat-input-area { display:flex; gap:8px; padding:9px; background:white; border-top:1px solid #eee; flex-shrink:0; }
        #chat-input { flex-grow:1; padding:8px 13px; border:1.5px solid #ddd; border-radius:20px; font-size:0.84rem; outline:none; resize:none; line-height:1.3; max-height:80px; overflow-y:auto; }

        #btn-send:hover { transform:scale(1.08); }

        /* SETTINGS MODAL */

        .rt-header { background:var(--navy); color:white; padding:15px; display:flex; justify-content:space-between; align-items:center; }
        .rt-body { padding:20px; max-height:80vh; overflow-y:auto; }
        #rt-input { width:100%; height:70px; padding:10px; border:1px solid #ddd; border-radius:10px; resize:none; margin-bottom:10px; font-size:0.85rem; }
        .btn-save { background:var(--navy); color:white; border:none; padding:12px; border-radius:10px; cursor:pointer; font-weight:bold; width:100%; margin-bottom:15px; }
        .speed-control { margin-bottom:18px; border-top:1px solid #eee; padding-top:14px; }
        .speed-label { font-size:0.85rem; font-weight:bold; color:var(--navy); display:flex; align-items:center; gap:5px; margin-bottom:8px; }
        #speed-slider { width:100%; cursor:pointer; accent-color:var(--navy); }
        .list-container { max-height:180px; overflow-y:auto; margin-top:8px; }
        #rt-list { list-style:none; }
        #rt-list li { display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid #f0f0f0; font-size:0.82rem; }
        .item-text { flex-grow:1; color:#333; }
        .muted { opacity:0.3; text-decoration:line-through; }
        .bc-section { margin-top:18px; border-top:2px solid #eee; padding-top:14px; }
        .bc-row { display:flex; gap:6px; margin-top:6px; }
        .bc-row input { flex-grow:1; padding:8px 10px; border-radius:8px; border:1px solid #ddd; font-size:0.83rem; }
        .btn-bc { background:#b91c1c; color:white; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:700; font-size:0.82rem; }

        /* EMERGENCY */
        #emergency-overlay { display:none; position:fixed; inset:0; z-index:9999; background:rgba(185,28,28,0.95); backdrop-filter:blur(8px); align-items:center; justify-content:center; padding:20px; color:white; text-align:center; }
        .emergency-box { max-width:500px; width:100%; background:#7f1d1d; border:4px solid #fca5a5; padding:30px; border-radius:24px; animation:shake 0.5s infinite; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        .emergency-title { font-size:2rem; font-weight:900; margin-bottom:15px; }
        .emergency-text { font-size:1.2rem; line-height:1.5; margin-bottom:25px; }
        .btn-ack { background:#fca5a5; color:#7f1d1d; border:none; padding:12px 40px; border-radius:12px; font-weight:bold; cursor:pointer; font-size:1.1rem; }

        /* ERROR BANNER */
        #err-banner { display:none; position:fixed; top:46px; left:0; right:0; background:#b91c1c; color:white; padding:8px 16px; font-size:0.82rem; font-weight:600; z-index:5000; text-align:center; }
        #err-banner.show { display:block; }
        #err-banner a { color:#fca5a5; text-decoration:underline; cursor:pointer; margin-left:8px; }

        /* Online users dropdown */
        #online-panel {
            display:none; position:absolute;
            top:100%; left:0; margin-top:4px;
            background:white; border-radius:12px;
            box-shadow:0 8px 24px rgba(0,0,0,0.18);
            z-index:4000; padding:10px 0;
            min-width:200px;
            border:0.5px solid #eee;
            animation:slideDown 0.15s ease;
        }
        #online-panel.show { display:block; }
        @keyframes slideDown { from{transform:translateY(-6px);opacity:0} to{transform:translateY(0);opacity:1} }
        .online-item { display:flex; align-items:center; gap:8px; padding:7px 14px; font-size:0.82rem; color:#333; }
        .online-item .odot { width:7px; height:7px; border-radius:50%; background:#22c55e; flex-shrink:0; }
        .online-item.me { color:#888; font-style:italic; }
        #online-panel-title { font-size:0.72rem; font-weight:700; color:#aaa; letter-spacing:1px; text-transform:uppercase; padding:4px 14px 8px; border-bottom:1px solid #f0f0f0; margin-bottom:4px; }
    </style>
</head>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
// ════════════════════════════════════
//  HELPER
// ════════════════════════════════════
function showError(msg) {
    console.error('[FB ERROR]', msg);
    document.getElementById('err-msg').textContent = msg;
    document.getElementById('err-banner').classList.add('show');
}
function hideError() {
    document.getElementById('err-banner').classList.remove('show');
}
function esc(t) {
    return (t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
// Sanitize Firebase key — hapus semua karakter tidak boleh: . # $ [ ] /
function safeKey(str) {
    return str.replace(/[.#$\[\]\/]/g, '_').replace(/\s+/g, '_').substring(0, 60);
}

// ════════════════════════════════════
//  FIREBASE INIT
// ════════════════════════════════════
const firebaseConfig = {
    apiKey:            "AIzaSyDrueWSjgvjaGtKAr--NElsyHCSAa7ZqE4",
    authDomain:        "tabelom60.firebaseapp.com",
    databaseURL:       "https://tabelom60-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "tabelom60",
    storageBucket:     "tabelom60.firebasestorage.app",
    messagingSenderId: "823392737112",
    appId:             "1:823392737112:web:6ccfafbd5123cdb858372d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ════════════════════════════════════
//  STATUS KONEKSI
// ════════════════════════════════════
let isConnected = false;

db.ref('.info/connected').on('value', snap => {
    isConnected = snap.val() === true;
    const dot   = document.getElementById('conn-dot');
    const label = document.getElementById('conn-label');
    if (isConnected) {
        dot.classList.add('on');
        label.textContent = 'Database OK';
        hideError();
        registerPresence(); // daftar hadir saat koneksi pulih
    } else {
        dot.classList.remove('on');
        label.textContent = 'Terputus...';
    }
});

// ════════════════════════════════════
//  RUNNING TEXT
// ════════════════════════════════════
let rtMsgs = [];
const rtSpan = document.getElementById('running-content');

db.ref('settings/speed').on('value', s => {
    const v = s.val() || 10;
    document.getElementById('speed-slider').value = v;
    document.getElementById('speed-val').textContent = v;
    rtSpan.style.animationDuration = v + 's';
}, err => showError('Speed read: ' + err.message));

db.ref('messages').on('value', snap => {
    const data = snap.val() || {};
    const list = document.getElementById('rt-list');
    list.innerHTML = ''; rtMsgs = [];
    Object.keys(data).forEach(k => {
        const m = data[k];
        if (m.Status === 'active') rtMsgs.push(m.Text);
        list.innerHTML += `<li>
            <span class="item-text ${m.Status==='hidden'?'muted':''}">${esc(m.Text)}</span>
            <span onclick="toggleRT('${k}','${m.Status}')" style="cursor:pointer">${m.Status==='active'?'👁️':'🚫'}</span>
            <span onclick="delRT('${k}')" style="cursor:pointer;color:red">🗑️</span>
        </li>`;
    });
    // FIX: gunakan > 0 bukan > 1
    if (rtMsgs.length > 0) rtSpan.textContent = rtMsgs[0];
}, err => showError('Messages read: ' + err.message));

rtSpan.addEventListener('animationiteration', () => {
    if (rtMsgs.length > 1) {
        const i = rtMsgs.indexOf(rtSpan.textContent);
        rtSpan.textContent = rtMsgs[(i + 1) % rtMsgs.length];
    }
});

function saveMsg() {
    const val = document.getElementById('rt-input').value.trim();
    if (!val) return;
    db.ref('messages').push({ Text: val, Status: 'active' })
        .then(() => document.getElementById('rt-input').value = '')
        .catch(err => showError('Gagal simpan pesan: ' + err.message + ' — Pastikan Firebase Rules sudah diset ke public!'));
}
function updateSpeed(v) {
    document.getElementById('speed-val').textContent = v;
    db.ref('settings/speed').set(+v).catch(err => showError('Speed: ' + err.message));
}
function toggleRT(id, cur) { db.ref('messages/'+id).update({ Status: cur==='active'?'hidden':'active' }); }
function delRT(id) { if (confirm('Hapus?')) db.ref('messages/'+id).remove(); }

// ════════════════════════════════════
//  NAMA USER
// ════════════════════════════════════
const NA = ["Tangki","Pipa","Kilang","Pompa","Solar","Pertalite","Oli","LPG","Aspal","Bensin","Kran","Filter"];
const NB = ["Terbang","Goyang","Balap","Sakti","Racing","Muter","Nari","Loncat","Kaget","Nyanyi","Miring","Ngantuk"];
function randName() {
    return NA[Math.random()*NA.length|0] + ' ' + NB[Math.random()*NB.length|0] + ' ' + (100+Math.random()*900|0);
}

let myName = localStorage.getItem('chatName') || '';
if (!myName) { myName = randName(); localStorage.setItem('chatName', myName); }
refreshNameUI();

function refreshNameUI() {
    document.getElementById('my-display-name').textContent = myName;
    document.getElementById('name-bar-label').textContent  = myName;
}
function changeName() {
    const n = prompt('Nama baru (maks 25 karakter):', myName);
    if (!n || !n.trim()) return;
    myName = n.trim().substring(0, 25);
    localStorage.setItem('chatName', myName);
    refreshNameUI();
    if (presRef) { presRef.remove(); presRef = null; }
    registerPresence();
}

// ════════════════════════════════════
//  PRESENCE (siapa online)
// ════════════════════════════════════
let presRef = null;
function registerPresence() {
    if (!isConnected || !myName) return;
    if (presRef) { presRef.remove(); presRef = null; }
    // key aman: pakai safeKey + timestamp
    const key = safeKey(myName) + '_' + Date.now();
    presRef = db.ref('chat_online/' + key);
    presRef.set({ name: myName, ts: Date.now() })
           .catch(err => showError('Presence: ' + err.message));
    presRef.onDisconnect().remove();
}

db.ref('chat_online').on('value', snap => {
    const data = snap.val() || {};
    const users = Object.values(data);
    const count = users.length;
    document.getElementById('online-count').textContent = count + ' orang online ▾';
    // populate panel
    const list = document.getElementById('online-panel-list');
    if (list) {
        list.innerHTML = users.length
            ? users.map(u => `<div class="online-item${u.name===myName?' me':''}"><span class="odot"></span>${u.name}${u.name===myName?' (Anda)':''}</div>`).join('')
            : '<div class="online-item" style="color:#aaa">Belum ada yang online</div>';
    }
}, err => showError('Online: ' + err.message));

function toggleOnlinePanel(e) {
    e.stopPropagation();
    document.getElementById('online-panel').classList.toggle('show');
}
// tutup panel saat klik di luar
document.addEventListener('click', () => {
    const p = document.getElementById('online-panel');
    if (p) p.classList.remove('show');
});

// ════════════════════════════════════
//  TYPING INDICATOR
// ════════════════════════════════════
let typTmr;
function handleTyping() {
    if (!isConnected) return;
    const key = safeKey(myName);
    db.ref('chat_typing/' + key).set({ name: myName, ts: Date.now() });
    clearTimeout(typTmr);
    typTmr = setTimeout(() => db.ref('chat_typing/' + key).remove(), 3000);
}

db.ref('chat_typing').on('value', snap => {
    const data = snap.val() || {};
    const typers = Object.values(data)
        .filter(t => t.name !== myName && Date.now() - t.ts < 4000)
        .map(t => t.name.split(' ')[0]);
    document.getElementById('typing-status').textContent =
        typers.length ? typers.join(', ') + ' mengetik...' : '';
});

// ════════════════════════════════════
//  CHAT UI
// ════════════════════════════════════
let chatOpen = false, unreadCount = 0;
let lastSeenKey = localStorage.getItem('lastSeenKey') || '';
let replyData = null;

function toggleChat() {
    chatOpen = !chatOpen;
    document.getElementById('chat-panel').classList.toggle('open', chatOpen);
    if (chatOpen) {
        unreadCount = 0;
        const b = document.getElementById('chat-badge');
        b.textContent = ''; b.classList.remove('show');
        document.getElementById('btn-chat').classList.remove('pulse');
        scrollToBottom();
        setTimeout(() => document.getElementById('chat-input').focus(), 80);
    }
}

// tutup chat saat klik di luar
document.addEventListener('click', e => {
    const panel = document.getElementById('chat-panel');
    const fab   = document.getElementById('btn-chat');
    if (chatOpen && !panel.contains(e.target) && !fab.contains(e.target)) toggleChat();
});

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    else handleTyping();
}
function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}
function scrollToBottom() {
    const el = document.getElementById('chat-messages');
    el.scrollTop = el.scrollHeight;
}

function replyToMessage(name, text) {
    replyData = { name, text };
    document.getElementById('reply-to-info').textContent = 'Membalas ' + name;
    document.getElementById('reply-to-text').textContent = text;
    document.getElementById('reply-preview').classList.add('show');
    document.getElementById('chat-input').focus();
}
function cancelReply() {
    replyData = null;
    document.getElementById('reply-preview').classList.remove('show');
}
function delChatMessage(key) {
    if (confirm('Hapus pesan ini?')) db.ref('chat_messages/' + key).remove();
}

// ════════════════════════════════════
//  KIRIM PESAN
// ════════════════════════════════════
function sendMessage() {
    if (!isConnected) {
        showError('Tidak terhubung ke database. Periksa koneksi & Firebase Rules.');
        return;
    }
    const input = document.getElementById('chat-input');
    const text  = input.value.trim();
    if (!text) return;

    const msg = { name: myName, text, ts: Date.now() };
    if (replyData) { msg.replyTo = replyData; cancelReply(); }

    db.ref('chat_messages').push(msg)
        .then(() => { input.value = ''; input.style.height = 'auto'; })
        .catch(err => {
            if (err.code === 'PERMISSION_DENIED') {
                showError('PERMISSION_DENIED — Buka Firebase Console › Realtime Database › Rules › set ke { ".read":true, ".write":true } lalu Publish!');
            } else {
                showError('Kirim gagal: ' + err.message);
            }
        });
}

// ════════════════════════════════════
//  RENDER PESAN (REALTIME)
// ════════════════════════════════════
const COLORS = ['#1d6fa5','#c0392b','#27ae60','#8e44ad','#d35400','#16a085','#e67e22','#e74c3c'];
const cmap = {}; let ci = 0;
function getColor(n) { if (!cmap[n]) cmap[n] = COLORS[ci++ % COLORS.length]; return cmap[n]; }
function fmt(ts) { return new Date(ts).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }

db.ref('chat_messages').limitToLast(100).on('value', snap => {
    const data = snap.val();
    const container = document.getElementById('chat-messages');
    container.innerHTML = '';

    if (!data) {
        container.innerHTML = '<div class="chat-divider" style="margin-top:30px">Belum ada pesan 👋</div>';
        return;
    }

    let lastDate = '';
    Object.keys(data).forEach(key => {
        const m = data[key];
        const d = new Date(m.ts).toLocaleDateString('id-ID',{day:'numeric',month:'long'});
        if (d !== lastDate) {
            lastDate = d;
            const div = document.createElement('div');
            div.className = 'chat-divider';
            div.textContent = '— ' + d + ' —';
            container.appendChild(div);
        }

        const isMe = m.name === myName;
        const row  = document.createElement('div');
        row.className = 'msg-row ' + (isMe ? 'me' : 'them');

        // escape nama untuk inline onclick — hindari single-quote break
        const safeName = (m.name || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        const safeText = (m.text || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ').substring(0, 80);

        const replyHtml = m.replyTo
            ? `<div class="reply-quote"><span class="reply-qname">${esc(m.replyTo.name)}</span>${esc(m.replyTo.text)}</div>`
            : '';

        row.innerHTML = `
            ${!isMe ? `<div class="msg-sender" style="color:${getColor(m.name)}">${esc(m.name)}</div>` : ''}
            <div class="msg-bubble">${replyHtml}${esc(m.text)}</div>
            <div class="msg-footer">
                <span class="msg-time">${fmt(m.ts)}</span>
                <button class="btn-act" onclick="replyToMessage('${safeName}','${safeText}')" title="Balas">↩️</button>
                ${isMe ? `<button class="btn-act" onclick="delChatMessage('${key}')" title="Hapus">🗑️</button>` : ''}
            </div>`;
        container.appendChild(row);
    });

    scrollToBottom();

    // Badge notifikasi kalau chat tertutup
    if (!chatOpen) {
        const keys   = Object.keys(data);
        const latest = keys[keys.length - 1];
        if (latest !== lastSeenKey && lastSeenKey !== '') {
            unreadCount++;
            const b = document.getElementById('chat-badge');
            b.textContent = unreadCount > 9 ? '9+' : unreadCount;
            b.classList.add('show');
            document.getElementById('btn-chat').classList.add('pulse');
            document.title = `(${unreadCount}) Pesan Baru!`;
            setTimeout(() => document.title = 'TabeL Kalkulasi & Report', 3000);
        }
        lastSeenKey = latest;
        localStorage.setItem('lastSeenKey', lastSeenKey);
    }
}, err => showError('Chat read error: ' + err.code + ' — ' + err.message));

// ════════════════════════════════════
//  EMERGENCY BROADCAST
// ════════════════════════════════════
function sendBroadcast() {
    const text = document.getElementById('bc-input').value.trim();
    if (!text) return;
    const pin = prompt('Masukkan PIN Admin:');
    if (pin === '6060') {
        db.ref('emergency_alert').set({ text, ts: Date.now() })
          .then(() => { document.getElementById('bc-input').value=''; closeModal(); alert('Broadcast terkirim!'); })
          .catch(err => showError('Broadcast: ' + err.message));
    } else { alert('PIN Salah!'); }
}

db.ref('emergency_alert').on('value', snap => {
    const d = snap.val();
    if (d && Date.now() - d.ts < 60000) {
        document.getElementById('emergency-msg').textContent = d.text;
        document.getElementById('emergency-overlay').style.display = 'flex';
    }
});
function ackEmergency() {
    document.getElementById('emergency-overlay').style.display = 'none';
    db.ref('emergency_alert').remove();
}

// ════════════════════════════════════
//  NAV
// ════════════════════════════════════
let curFrameIdx = 1;
function changeIframe(idx, btn) {
    document.querySelectorAll('.iframe-layer').forEach(f => f.classList.remove('active'));
    document.getElementById('frame' + idx).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    curFrameIdx = idx;
}
function refreshCurrentIframe() {
    const fr = document.querySelector(`#frame${curFrameIdx} iframe`);
    if (fr) { const s = fr.src; fr.src = 'about:blank'; setTimeout(() => fr.src = s, 50); }
}
function openModal()  { document.getElementById('rt-modal').style.display = 'block'; }
function closeModal() { document.getElementById('rt-modal').style.display = 'none'; }

// Clock
setInterval(() => {
    document.getElementById('digital-clock').textContent = new Date().toLocaleTimeString('en-GB');
}, 1000);
</script>
